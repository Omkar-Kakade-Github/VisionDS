<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VisionDS</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div>
          <h1>VisionDS</h1>
          <p id="header-detail">Binary tree</p>
        </div>
        <div class="header-actions">
          <button id="theme-toggle" class="utility" type="button" title="Toggle dark mode">Dark</button>
          <button id="generate" class="primary" type="button">Generate</button>
        </div>
      </header>

      <section class="controls" aria-label="Generator controls">
        <label>
          <span>Structure</span>
          <select id="structure-select"></select>
        </label>
        <div id="config-controls" class="config-grid"></div>
      </section>

      <section class="examples" aria-label="Generated examples">
        <div class="section-head">
          <h2>Examples</h2>
          <label class="count-control">
            <span>Count</span>
            <input id="example-count" type="number" min="1" max="8" step="1">
          </label>
        </div>
        <div id="example-list" class="example-list"></div>
      </section>

      <section class="workspace" aria-label="Visualizer">
        <div class="visual-head">
          <div>
            <h2 id="example-title">Example</h2>
            <p id="example-detail"></p>
          </div>
          <div class="visual-tools">
            <p id="selected-target" class="target-pill">No target</p>
            <div class="zoom-control" aria-label="Canvas zoom">
              <button id="zoom-out" type="button" title="Zoom out">-</button>
              <input id="zoom-range" type="range" min="50" max="180" step="10" value="100" aria-label="Canvas zoom">
              <button id="zoom-in" type="button" title="Zoom in">+</button>
              <button id="zoom-reset" type="button" title="Reset zoom">100%</button>
            </div>
          </div>
        </div>
        <div id="visualizer" class="visualizer" tabindex="0"></div>
        <div id="target-action-bar" class="target-action-bar" hidden>
          <div class="target-copy">
            <h2>Target action</h2>
            <p id="target-action-detail">Select a node to choose an action.</p>
          </div>
          <label>
            <span>Action</span>
            <select id="target-action-select">
              <option value="visit">Visit target</option>
              <option value="remove">Remove target</option>
              <option value="jump-trace">Jump trace</option>
            </select>
          </label>
          <label>
            <span>Label</span>
            <input id="target-action-label" type="text" maxlength="32" placeholder="target">
          </label>
          <div class="target-buttons">
            <button id="apply-target-action" class="primary" type="button">Apply</button>
            <button id="reset-target-ops" type="button">Reset ops</button>
            <button id="clear-target" type="button">Clear target</button>
          </div>
        </div>
      </section>

      <section class="trace-panel" aria-label="Trace controls">
        <div class="trace-top">
          <label>
            <span>Trace</span>
            <select id="trace-select"></select>
          </label>
          <div class="trace-buttons">
            <button id="trace-reset" type="button" title="Reset trace">Reset</button>
            <button id="trace-prev" type="button" title="Previous step">Prev</button>
            <button id="trace-play" type="button" title="Play trace">Play</button>
            <button id="trace-next" type="button" title="Next step">Next</button>
          </div>
        </div>
        <div class="step-meter">
          <progress id="trace-progress" max="1" value="0"></progress>
          <span id="trace-count">0 / 0</span>
        </div>
        <div id="trace-step" class="trace-step"></div>
      </section>

      <section class="annotations" aria-label="Annotations">
        <div class="section-head">
          <h2>Annotations</h2>
          <button id="clear-annotations" type="button">Clear</button>
        </div>
        <div class="annotation-controls">
          <label>
            <span>Label</span>
            <input id="annotation-label" type="text" maxlength="32" placeholder="current">
          </label>
          <label>
            <span>Color</span>
            <select id="annotation-color">
              <option value="#176b5d">Teal</option>
              <option value="#b05a00">Amber</option>
              <option value="#a9333a">Red</option>
              <option value="#5145a8">Indigo</option>
            </select>
          </label>
          <div class="annotation-buttons">
            <button id="add-pointer" type="button">Pointer</button>
            <button id="add-highlight" type="button">Highlight</button>
            <button id="add-note" type="button">Note</button>
          </div>
        </div>
        <div id="annotation-list" class="annotation-list"></div>
      </section>
    </main>
    <script type="module" src="src/sidepanel.js"></script>
  </body>
</html>
